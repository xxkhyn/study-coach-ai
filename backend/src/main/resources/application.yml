spring:
  application:
    name: study-coach-ai-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/study_coach_ai}
    username: ${SPRING_DATASOURCE_USERNAME:studycoach}
    password: ${SPRING_DATASOURCE_PASSWORD:studycoach}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

server:
  port: ${PORT:${SERVER_PORT:8080}}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
  ai:
    gemini:
      api-key: ${GEMINI_API_KEY:}
      model: ${GEMINI_MODEL:gemini-1.5-flash}
      connect-timeout-ms: ${GEMINI_CONNECT_TIMEOUT_MS:5000}
      read-timeout-ms: ${GEMINI_READ_TIMEOUT_MS:30000}
  jwt:
    secret: ${JWT_SECRET:study-coach-ai-dev-secret-key-change-me-please}
    expires-in-seconds: ${JWT_EXPIRES_IN_SECONDS:86400}
