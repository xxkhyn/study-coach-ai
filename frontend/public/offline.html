<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#2563eb" />
    <title>オフライン | Study Coach AI</title>
    <style>
      :root {
        color: #172033;
        background: #ffffff;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background: linear-gradient(180deg, #eff6ff 0%, #ffffff 55%);
      }

      main {
        width: min(420px, 100%);
        border: 1px solid #dbeafe;
        border-radius: 16px;
        background: #ffffff;
        box-shadow: 0 18px 45px rgba(37, 99, 235, 0.12);
        padding: 28px;
      }

      .mark {
        width: 48px;
        height: 48px;
        border-radius: 14px;
        display: grid;
        place-items: center;
        color: #ffffff;
        font-weight: 800;
        background: #2563eb;
        margin-bottom: 20px;
      }

      h1 {
        font-size: 1.35rem;
        margin: 0 0 12px;
      }

      p {
        line-height: 1.7;
        margin: 0;
        color: #475569;
      }

      button {
        width: 100%;
        margin-top: 24px;
        border: 0;
        border-radius: 10px;
        background: #2563eb;
        color: #ffffff;
        font-weight: 700;
        padding: 12px 16px;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark">SC</div>
      <h1>現在オフラインです</h1>
      <p>ネットワーク接続後に再度お試しください。学習データやAI機能の利用にはオンライン接続が必要です。</p>
      <button type="button" onclick="window.location.reload()">再読み込み</button>
    </main>
  </body>
</html>
