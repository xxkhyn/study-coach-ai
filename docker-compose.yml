services:
  db:
    image: postgres:16-alpine
    container_name: study-coach-ai-db
    environment:
      POSTGRES_DB: study_coach_ai
      POSTGRES_USER: studycoach
      POSTGRES_PASSWORD: studycoach
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studycoach -d study_coach_ai"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: study-coach-ai-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/study_coach_ai
      SPRING_DATASOURCE_USERNAME: studycoach
      SPRING_DATASOURCE_PASSWORD: studycoach
      CORS_ALLOWED_ORIGINS: http://localhost:5173
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-1.5-flash}
      GEMINI_CONNECT_TIMEOUT_MS: ${GEMINI_CONNECT_TIMEOUT_MS:-5000}
      GEMINI_READ_TIMEOUT_MS: ${GEMINI_READ_TIMEOUT_MS:-30000}
      JWT_SECRET: ${JWT_SECRET:-study-coach-ai-dev-secret-key-change-me-please}
      JWT_EXPIRES_IN_SECONDS: ${JWT_EXPIRES_IN_SECONDS:-86400}
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
    container_name: study-coach-ai-frontend
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: http://localhost:8080/api
    ports:
      - "5173:5173"

volumes:
  postgres-data:
